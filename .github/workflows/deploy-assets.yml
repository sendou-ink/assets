name: Deploy assets to Spaces

on:
  push:
    branches: [main]
    paths:
      - "assets/**"
      - ".github/workflows/deploy-assets.yml"
  workflow_dispatch: # allow manual runs (e.g. first full upload)

# Never run two deploys at once; queue them so we don't get a half-synced bucket.
concurrency:
  group: deploy-assets
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install s3cmd
        run: sudo apt-get update && sudo apt-get install -y s3cmd

      # Write the config from env so secrets never appear in argv / logs.
      # host_base / host_bucket point s3cmd at DigitalOcean Spaces instead of AWS.
      - name: Configure s3cmd
        env:
          SPACES_ACCESS_KEY: ${{ secrets.SPACES_ACCESS_KEY }}
          SPACES_SECRET_KEY: ${{ secrets.SPACES_SECRET_KEY }}
          SPACES_ENDPOINT: ${{ vars.SPACES_ENDPOINT }} # e.g. nyc3.digitaloceanspaces.com
        run: |
          cat > ~/.s3cfg <<EOF
          [default]
          access_key = ${SPACES_ACCESS_KEY}
          secret_key = ${SPACES_SECRET_KEY}
          host_base = ${SPACES_ENDPOINT}
          host_bucket = %(bucket)s.${SPACES_ENDPOINT}
          use_https = True
          EOF

      # Two passes so .avif gets the correct Content-Type. s3cmd guesses the
      # type from the extension and does not know .avif, so it would be served
      # as application/octet-stream and not render in browsers.
      #
      # --delete-removed keeps Spaces a mirror of the repo (removes deleted files).
      #   s3cmd applies --exclude/--include to BOTH sides, so each pass only ever
      #   deletes within its own slice (non-avif / avif) — they don't clobber each other.
      # --acl-public makes objects world-readable (Spaces objects are private by default).
      # sync compares size + md5, so a fresh checkout's new mtimes don't cause re-uploads.
      - name: Sync non-avif assets
        run: |
          s3cmd sync assets/ "s3://${{ vars.SPACES_BUCKET }}/${{ vars.SPACES_PREFIX }}" \
            --exclude '*.avif' \
            --delete-removed \
            --acl-public \
            --no-progress

      - name: Sync avif assets
        run: |
          s3cmd sync assets/ "s3://${{ vars.SPACES_BUCKET }}/${{ vars.SPACES_PREFIX }}" \
            --exclude '*' --include '*.avif' \
            --mime-type 'image/avif' \
            --delete-removed \
            --acl-public \
            --no-progress
