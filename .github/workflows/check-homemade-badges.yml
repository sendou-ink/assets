name: Check homemade badges

on:
  pull_request:
    paths:
      - "homemade.json"
      - "assets/badges/**"
      - "check-homemade-badges.js"
      - ".github/workflows/check-homemade-badges.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check homemade badges
        run: node check-homemade-badges.js
